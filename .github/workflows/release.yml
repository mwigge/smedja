name: release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            os: linux
            arch: x86_64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            os: linux
            arch: aarch64
          # Cross-compiled to x86_64 on an Apple-Silicon runner: the macos-13
          # Intel runners are scarce/retired and previously hung the release for
          # 24h. Packaging (cargo-bundle, hdiutil) is target-agnostic.
          - target: x86_64-apple-darwin
            runner: macos-latest
            os: darwin
            arch: x86_64
          - target: aarch64-apple-darwin
            runner: macos-latest
            os: darwin
            arch: aarch64

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      # Warn (don't block) when the PKGBUILD still skips checksum verification.
      # The .deb/.rpm/.dmg/tarball artifacts do not depend on PKGBUILD checksums;
      # only the AUR package does, and that is updated manually post-release with
      # `updpkgsums` (the checksums can only be computed once these artifacts are
      # published — a first-release bootstrap). So this is advisory, not a gate.
      - name: warn on PKGBUILD SKIP checksums
        if: runner.os == 'Linux'
        run: |
          if grep -qE "^sha256sums_(x86_64|aarch64)=\('SKIP'\)" assets/PKGBUILD; then
            echo "::warning::assets/PKGBUILD has SKIP checksums — run updpkgsums against this release before pushing to the AUR" >&2
          fi

      - name: install linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libssl-dev pkg-config lld

      - name: build
        run: |
          cargo build --release --target ${{ matrix.target }} \
            --bin smdjad --bin smj --bin smedja --bin smedja-tui

      - name: package tarball
        run: |
          OUT="smedja-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir "$OUT"
          for bin in smdjad smj smedja smedja-tui; do
            cp "target/${{ matrix.target }}/release/$bin" "$OUT/"
          done
          cp assets/smdjad.service "$OUT/"
          cp assets/smedja.desktop "$OUT/"
          cp assets/brand/smedja-256.png "$OUT/"
          tar -czf "$OUT.tar.gz" "$OUT"

      # ── Linux: .deb and .rpm ──────────────────────────────────────────────────
      - name: install linux packaging tools
        if: runner.os == 'Linux'
        run: |
          cargo install cargo-deb --locked --version 3.7.0
          cargo install cargo-generate-rpm --locked --version 0.21.0

      - name: build deb
        if: runner.os == 'Linux'
        run: |
          cargo deb -p smdjad --target ${{ matrix.target }} --no-build --no-strip
          DEB=$(find "target/${{ matrix.target }}/debian" -name "*.deb" | head -1)
          cp "$DEB" "smedja-linux-${{ matrix.arch }}.deb"

      - name: build rpm
        if: runner.os == 'Linux'
        run: |
          cargo generate-rpm -p bin/smdjad --target ${{ matrix.target }}
          RPM=$(find "target/${{ matrix.target }}/generate-rpm" -name "*.rpm" | head -1)
          cp "$RPM" "smedja-linux-${{ matrix.arch }}.rpm"

      # ── macOS: .app bundle + DMG ──────────────────────────────────────────────
      - name: install cargo-bundle
        if: runner.os == 'macOS'
        run: cargo install cargo-bundle --locked --version 0.11.0

      - name: build app bundle and DMG
        if: runner.os == 'macOS'
        run: |
          # cargo-bundle 0.11 has no --package flag and errors with "No root
          # package found in workspace" at the virtual root, so run it inside the
          # smedja package. The workspace target dir is still used, so the bundle
          # lands under the root-relative target/ path the rest of this step reads.
          ( cd term/bin/smedja && cargo bundle --release --target ${{ matrix.target }} --bin smedja )
          APP="target/${{ matrix.target }}/release/bundle/osx/smedja.app"
          DMG="smedja-darwin-${{ matrix.arch }}.dmg"
          mkdir -p /tmp/dmg-stage
          cp -r "$APP" /tmp/dmg-stage/
          ln -s /Applications /tmp/dmg-stage/Applications
          hdiutil create \
            -volname smedja \
            -srcfolder /tmp/dmg-stage \
            -ov \
            -format UDZO \
            "$DMG"

      # ── Upload artifacts ──────────────────────────────────────────────────────
      - name: upload tarball
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: tarball-${{ matrix.os }}-${{ matrix.arch }}
          path: smedja-${{ matrix.os }}-${{ matrix.arch }}.tar.gz

      - name: upload deb
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deb-${{ matrix.arch }}
          path: smedja-linux-${{ matrix.arch }}.deb

      - name: upload rpm
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rpm-${{ matrix.arch }}
          path: smedja-linux-${{ matrix.arch }}.rpm

      - name: upload dmg
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dmg-${{ matrix.arch }}
          path: smedja-darwin-${{ matrix.arch }}.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          merge-multiple: true
          path: dist/

      # Single integrity manifest over every artifact. Bare filenames (no dist/
      # prefix) so install.sh can match its tarball name directly.
      - name: checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file - \
            dist/*.tar.gz \
            dist/*.deb \
            dist/*.rpm \
            dist/*.dmg \
            dist/SHA256SUMS \
            scripts/install.sh <<'EOF'
          See [README](https://github.com/mwigge/smedja#install) for installation instructions.

          **One-line install:**
          ```sh
          curl -fsSL https://github.com/mwigge/smedja/releases/latest/download/install.sh | sh
          ```
          EOF

