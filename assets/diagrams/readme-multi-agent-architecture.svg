  <g opacity="0.92">
    <text x="54" y="102" fill="#f4d7a1" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">/parallel &quot;Add OAuth to the API&quot; --roles impl,test,review</text><text x="54" y="124" fill="#f4d7a1" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace"></text><text x="54" y="146" fill="#f4d7a1" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">smdjad orchestrator</text><text x="54" y="168" fill="#d99b55" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">  │</text><text x="54" y="190" fill="#ffb24a" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">  ├── worktree: task/&lt;id&gt;/impl  ──▶  assayer: role=impl, runner=local</text><text x="54" y="212" fill="#d99b55" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">  │                                   model: Qwen3-14B, tools: full</text><text x="54" y="234" fill="#d99b55" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">  │</text><text x="54" y="256" fill="#ffb24a" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">  ├── worktree: task/&lt;id&gt;/test  ──▶  assayer: role=test, runner=local</text><text x="54" y="278" fill="#d99b55" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">  │   (unblocks when impl done)       model: Qwen3-14B, tools: bash + edit</text><text x="54" y="300" fill="#d99b55" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">  │</text><text x="54" y="322" fill="#ffb24a" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">  └── worktree: task/&lt;id&gt;/review ──▶ assayer: role=review, runner=claude</text><text x="54" y="344" fill="#f4d7a1" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">      (unblocks when test done)       model: claude-sonnet, tools: read-only</text>
