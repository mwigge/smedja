ono, JetBrains Mono, Menlo, monospace">│       ├── reviewer (minimax/fast)  read-only                    │</text><text x="54" y="322" fill="#d99b55" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">│       └── fix (local/rs-llmctl)  retry ≤ 3                      │</text><text x="54" y="344" fill="#d99b55" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">│                                                                 │</text><text x="54" y="366" fill="#ffb24a" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">│  failure mining ─▶ .smedja/guides/&lt;role&gt;.md ─▶ stable_prefix    │</text><text x="54" y="388" fill="#ffb24a" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">│  SmartCrusher ─▶ strips tool result nulls before LLM call       │</text><text x="54" y="410" fill="#ffb24a" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">│  LocalProvider ─▶ rs-llmctl capability pre-flight               │</text><text x="54" y="432" fill="#d99b55" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">│  Evaluator ≠ Generator (enforced by agents.toml runner field)   │</text><text x="54" y="454" fill="#d99b55" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">└─────────────────────────────────────────────────────────────────┘</text>
