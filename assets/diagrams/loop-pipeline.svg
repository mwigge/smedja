no, JetBrains Mono, Menlo, monospace">                     │ role=review                │</text><text x="54" y="1004" fill="#d99b55" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">                     │ runner: claude/minimax     │</text><text x="54" y="1026" fill="#d99b55" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">                     │ tier: fast                 │</text><text x="54" y="1048" fill="#d99b55" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">                     │ READ ONLY - cannot commit  │</text><text x="54" y="1070" fill="#d99b55" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">                     └────────────┬───────────────┘</text><text x="54" y="1092" fill="#d99b55" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">                          pass ───┴─── findings</text><text x="54" y="1114" fill="#d99b55" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">                            │              │</text><text x="54" y="1136" fill="#ffb24a" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">                            ▼              ▼</text><text x="54" y="1158" fill="#d99b55" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">                       mark task      ┌───────────┐</text><text x="54" y="1180" fill="#d99b55" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">                       [x] done       │ FIX agent │</text><text x="54" y="1202" fill="#d99b55" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">                    