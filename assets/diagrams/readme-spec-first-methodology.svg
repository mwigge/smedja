"preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">  TddGate: failing test must exist before first edit_file</text><text x="54" y="388" fill="#d99b55" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">        │</text><text x="54" y="410" fill="#ffb24a" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">        ▼</text><text x="54" y="432" fill="#f4d7a1" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">  impl role executes</text><text x="54" y="454" fill="#d99b55" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">        │</text><text x="54" y="476" fill="#ffb24a" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">        ▼</text><text x="54" y="498" fill="#f4d7a1" font-size="18" xml:space="preserve" font-family="DejaVu Sans Mono, JetBrains Mono, Menlo, monospace">  review role (read-only tools only)</text>
