[package]
name        = "smedja-term"
description = "smedja GPU-accelerated terminal emulator (wgpu, block model, native daemon integration)"
version.workspace    = true
edition.workspace    = true
license.workspace    = true
repository.workspace = true

[[bin]]
name = "smedja-term"
path = "src/main.rs"

[dependencies]
anyhow            = { workspace = true }
clap              = { workspace = true }
dirs              = "5"
pollster          = "0.3"
russh             = "0.61"
serde             = { workspace = true }
st-agent          = { path = "../../crates/st-agent" }
st-blocks         = { path = "../../crates/st-blocks" }
st-config         = { path = "../../crates/st-config" }
st-glyph          = { path = "../../crates/st-glyph" }
st-pty            = { path = "../../crates/st-pty" }
st-render         = { path = "../../crates/st-render" }
st-statusbar      = { path = "../../crates/st-statusbar" }
taffy             = { workspace = true }
tokio             = { workspace = true }
toml              = { workspace = true }
tracing           = { workspace = true }
tracing-subscriber = { workspace = true }
uuid              = { workspace = true }
wgpu              = { workspace = true }
winit             = { workspace = true }

[dev-dependencies]
portable-pty = { workspace = true }
vte          = { workspace = true }
