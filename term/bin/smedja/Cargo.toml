[package]
name        = "smedja"
description = "smedja GPU-accelerated terminal emulator (wgpu, block model, native daemon integration)"
version.workspace    = true
edition.workspace    = true
license.workspace    = true
repository.workspace = true

[package.metadata.bundle]
name              = "smedja"
identifier        = "nu.wigge.smedja"
icon              = ["../../../assets/brand/smedja.icns"]
# No `version` here on purpose: cargo-bundle falls back to the package version
# (version.workspace = true), so the bundle always tracks the workspace.
copyright         = "© 2025 Morgan Wigge"
category          = "developer-tools"
short_description = "GPU-accelerated terminal emulator and AI orchestration forge"
long_description  = """
smedja is a Rust-native forge for multi-agent AI orchestration.
Route across local models, cloud APIs, and specialist roles with
a GPU terminal, full OTel traceability, and a wire protocol that
keeps everything interoperable.
"""

[[bin]]
name = "smedja"
path = "src/main.rs"

[dependencies]
anyhow            = { workspace = true }
arboard           = "3"
clap              = { workspace = true }
dirs              = "5"
image             = { version = "0.25", default-features = false, features = ["png"] }
pollster          = "0.3"
russh             = "0.61"
serde             = { workspace = true }
st-agent          = { path = "../../crates/st-agent" }
st-blocks         = { path = "../../crates/st-blocks" }
st-config         = { path = "../../crates/st-config" }
st-glyph          = { path = "../../crates/st-glyph" }
st-pty            = { path = "../../crates/st-pty" }
st-render         = { path = "../../crates/st-render" }
st-statusbar      = { path = "../../crates/st-statusbar" }
taffy             = { workspace = true }
tokio             = { workspace = true }
toml              = { workspace = true }
tracing           = { workspace = true }
tracing-subscriber = { workspace = true }
uuid              = { workspace = true }
wgpu              = { workspace = true }
which             = { workspace = true }
winit             = { workspace = true }

[dev-dependencies]
portable-pty = { workspace = true }
vte          = { workspace = true }
