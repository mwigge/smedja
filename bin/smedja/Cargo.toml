[package]
name        = "smedja"
description = "smedja terminal client (ratatui TUI)"
version.workspace    = true
edition.workspace    = true
license.workspace    = true
repository.workspace = true

[[bin]]
name = "smedja"
path = "src/main.rs"

[dependencies]
anyhow             = { workspace = true }
clap               = { workspace = true }
crossterm          = { workspace = true }
ratatui            = { workspace = true }
rustyline          = { workspace = true }
serde              = { workspace = true }
serde_json         = { workspace = true }
smedja-assayer     = { path = "../../crates/smedja-assayer" }
smedja-graph       = { path = "../../crates/smedja-graph" }
smedja-ingot       = { path = "../../crates/smedja-ingot" }
smedja-memory      = { path = "../../crates/smedja-memory" }
smedja-methodology = { path = "../../crates/smedja-methodology" }
smedja-rpc         = { path = "../../crates/smedja-rpc" }
syntect            = "5"
tokio              = { workspace = true }
tracing            = { workspace = true }
tracing-subscriber = { workspace = true }
