[package]
name        = "smj"
description = "smedja control CLI — lifecycle, sessions, workspace, audit"
version.workspace    = true
edition.workspace    = true
license.workspace    = true
repository.workspace = true

[[bin]]
name = "smj"
path = "src/main.rs"

[dependencies]
anyhow          = { workspace = true }
clap            = { workspace = true }
reqwest         = { workspace = true, features = ["blocking"] }
serde           = { workspace = true }
serde_json      = { workspace = true }
smedja-assayer  = { path = "../../crates/smedja-assayer" }
smedja-graph    = { path = "../../crates/smedja-graph" }
smedja-ingot    = { path = "../../crates/smedja-ingot" }
smedja-plugins  = { path = "../../crates/smedja-plugins" }
smedja-rpc      = { path = "../../crates/smedja-rpc" }
st-config       = { path = "../../term/crates/st-config" }
tokio           = { workspace = true }
tracing         = { workspace = true }
tracing-subscriber = { workspace = true }
