[package]
name        = "smj"
description = "smedja control CLI — lifecycle, sessions, workspace, audit"
version.workspace    = true
edition.workspace    = true
license.workspace    = true
repository.workspace = true

[[bin]]
name = "smj"
path = "src/main.rs"

[dependencies]
anyhow          = { workspace = true }
chrono          = { workspace = true }
clap            = { workspace = true }
reqwest         = { workspace = true, features = ["blocking"] }
serde           = { workspace = true }
serde_json      = { workspace = true }
smedja-assayer  = { path = "../../crates/smedja-assayer" }
smedja-eval     = { path = "../../crates/smedja-eval" }
smedja-ingot    = { path = "../../crates/smedja-ingot" }
smedja-plugins  = { path = "../../crates/smedja-plugins" }
smedja-security = { path = "../../crates/smedja-security" }
smedja-rpc      = { path = "../../crates/smedja-rpc" }
tokio           = { workspace = true }
which           = { workspace = true }
tracing         = { workspace = true }
tracing-subscriber = { workspace = true }

[dev-dependencies]
tempfile = "3"
toml     = { workspace = true }
