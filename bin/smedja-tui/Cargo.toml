[package]
name        = "smedja-tui"
description = "smedja agent dashboard (ratatui TUI, runs inside the smedja terminal)"
version.workspace    = true
edition.workspace    = true
license.workspace    = true
repository.workspace = true

[[bin]]
name = "smedja-tui"
path = "src/main.rs"

[dependencies]
anyhow             = { workspace = true }
arboard            = "3"
clap               = { workspace = true }
crossterm          = { workspace = true }
ratatui            = { workspace = true }
rustyline          = { workspace = true }
serde              = { workspace = true }
serde_json         = { workspace = true }
smedja-bellows      = { path = "../../crates/smedja-bellows" }
smedja-lsp         = { path = "../../crates/smedja-lsp" }
smedja-rpc         = { path = "../../crates/smedja-rpc" }
smedja-testkit     = { path = "../../crates/smedja-testkit" }
syntect            = "5"
tokio              = { workspace = true }
toml               = { workspace = true }
tracing            = { workspace = true }
tracing-subscriber = { workspace = true }
tree-sitter        = { workspace = true }
tree-sitter-go         = { workspace = true }
tree-sitter-python     = { workspace = true }
tree-sitter-rust   = { workspace = true }
tree-sitter-typescript = { workspace = true }
unicode-width      = { workspace = true }

[dev-dependencies]
tempfile = "3"
